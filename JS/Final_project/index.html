<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dev Profile Finder</title>
</head>
<body>

    <h1>Dev Profile Finder</h1>

    <!-- Input section -->
    <input 
        type="text" 
        id="username-input" 
        placeholder="Enter GitHub username"
    />
    <button id="search-btn">Search</button>

    <!-- Status messages -->
    <p id="loading-msg" style="display:none;">Searching...</p>
    <p id="error-msg" style="display:none;"></p>

    <!-- Result section — hidden until data loads -->
    <div id="profile-card" style="display: block;" >
        <h2 id="name"></h2>
        <p id="bio"></p>
        <p id="location"></p>
        <p id="repos"></p>
        <p id="followers"></p>
    </div>

    <!-- JS files — order matters -->
    <!-- api.js loads first because app.js depends on it -->
    <script type="module" src="api.js"></script>
    <script type="module" src="app.js"></script>

</body>
</html>
